<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusGate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0e1019;
      color: #e2e4ea;
      padding: 0;
      overflow: hidden;
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .popup-logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6366f1 0%, #4f8cff 100%);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .popup-logo svg {
      width: 22px; height: 22px;
      color: #fff;
    }

    .popup-brand {
      display: flex;
      flex-direction: column;
    }
    .popup-name {
      font-size: 16px;
      font-weight: 800;
      color: #f0f1f5;
      letter-spacing: -0.3px;
    }
    .popup-tagline {
      font-size: 11px;
      color: #5a5e73;
    }

    .popup-body {
      padding: 16px 20px;
    }

    .popup-stat {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #13151e;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .popup-stat-icon {
      width: 36px; height: 36px;
      background: rgba(99,102,241,0.12);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .popup-stat-icon svg {
      width: 18px; height: 18px;
      color: #818cf8;
    }

    .popup-stat-info {
      display: flex;
      flex-direction: column;
    }
    .popup-stat-value {
      font-size: 20px;
      font-weight: 800;
      color: #f0f1f5;
      line-height: 1.2;
    }
    .popup-stat-label {
      font-size: 11.5px;
      color: #5a5e73;
    }

    .popup-settings-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 0;
      background: #6366f1;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }
    .popup-settings-btn:hover {
      background: #5558e6;
    }
    .popup-settings-btn svg {
      width: 16px; height: 16px;
    }

    .popup-footer {
      padding: 12px 20px 16px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .popup-footer-text {
      font-size: 11px;
      color: #3f4255;
    }

    .popup-status {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #13151e;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(34,197,94,0.4);
      flex-shrink: 0;
    }
    .status-text {
      font-size: 13px;
      color: #8b8fa3;
    }
    .status-text strong {
      color: #22c55e;
      font-weight: 600;
    }
    .status-dot.paused {
      background: #5a5e73;
      box-shadow: none;
    }
    .status-text.paused strong {
      color: #5a5e73;
    }
  </style>
</head>
<body>

  <div class="popup-header">
    <div class="popup-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div class="popup-brand">
      <span class="popup-name">FocusGate</span>
      <span class="popup-tagline">Pause. Reflect. Proceed.</span>
    </div>
  </div>

  <div class="popup-body">
    <div class="popup-status">
      <span class="status-dot"></span>
      <span class="status-text"><strong>Active</strong> — Guarding your focus</span>
    </div>

    <div class="popup-stat">
      <div class="popup-stat-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        </svg>
      </div>
      <div class="popup-stat-info">
        <span class="popup-stat-value" id="block-count">0</span>
        <span class="popup-stat-label">Websites blocked</span>
      </div>
    </div>

    <button class="popup-settings-btn" id="open-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Open Settings
    </button>
  </div>

  <div class="popup-footer">
    <span class="popup-footer-text">FocusGate v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
